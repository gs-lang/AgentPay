name: Publish agent-pay-mcp to npm

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (patch/minor/major) — leave blank to use version in package.json'
        required: false
        default: ''
  push:
    tags:
      - 'mcp-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Bump version (optional)
        if: ${{ github.event.inputs.version_bump != '' }}
        run: npm version ${{ github.event.inputs.version_bump }} --no-git-tag-version

      - name: Build MCP server
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Show published package info
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Published agent-pay-mcp@$PKG_VERSION to https://www.npmjs.com/package/agent-pay-mcp"
